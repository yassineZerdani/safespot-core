# Production override for OVH deployment
# Usage: docker-compose -f docker-compose.yml -f docker-compose.prod.yml up -d

services:
  db:
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safespot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-safespot}

  redis:
    restart: unless-stopped

  web:
    build: .
    command: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --threads 2
    restart: unless-stopped
    volumes: []  # No dev mount in production
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-safespot}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-safespot}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
