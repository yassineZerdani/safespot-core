services:
  db:
    image: postgis/postgis:latest
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-safespot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-safespot}
      POSTGRES_DB: ${POSTGRES_DB:-safespot}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safespot"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  web:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-safespot}:${POSTGRES_PASSWORD:-safespot}@db:5432/${POSTGRES_DB:-safespot}
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings.development
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  postgres_data:
